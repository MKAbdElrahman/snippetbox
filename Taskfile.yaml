version: 3

dotenv: [.env]
env:
  APP_NAME: main
  TEMP_DIR: ./tmp
  BUILD_DIR: ./cmd/web

tasks:
  mysql-up: docker compose  -f  ./mysql/docker-compose.yaml up -d
  mysql-down: docker compose  -f  ./mysql/docker-compose.yaml down

  templ-generate:
    cmds:
      - templ generate
  build:
    deps: [templ-generate]
    cmds:
      - go build -o  $TEMP_DIR/$APP_NAME    $BUILD_DIR
  run:
    deps: [build]
    cmds:
      - ./$TEMP_DIR/$APP_NAME
  clean:
    cmds:
      - rm -rf $TEMP_DIR
